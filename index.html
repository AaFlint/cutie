<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Workspace</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-main: #faf7f8;
            --surface: #ffffff;
            --primary: #ff758f;
            --accent: #ffb3c1;
            --text: #2b2224;
            --muted: #8c7b7e;
            --border: #f0e4e6;
            --timing: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Quicksand', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text); min-height: 100vh; padding: 40px 20px; }

        .workspace-container { max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: 30px; }

        /* Top Bar: Minimal Header & Greeting */
        .header-section { display: flex; justify-content: space-between; align-items: center; padding-bottom: 10px; }
        .brand-title { font-family: 'Fredoka', sans-serif; font-size: 1.4rem; color: var(--primary); font-weight: 700; }
        .greeting-bubble { font-family: 'Fredoka', sans-serif; font-size: 1.05rem; color: var(--muted); font-weight: 600; }

        /* Section 1: Dashboard Catalog Shelf */
        .dashboard-shelf {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(255, 117, 143, 0.02);
        }
        .shelf-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .shelf-header h2 { font-family: 'Fredoka', sans-serif; font-size: 1.2rem; color: var(--text); }
        
        .new-btn {
            background-color: #fff0f2;
            color: var(--primary);
            border: none;
            padding: 8px 16px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s var(--timing);
        }
        .new-btn:hover { background-color: var(--primary); color: white; }

        .grid-shelf { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; }
        .project-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: all 0.3s var(--timing);
            position: relative;
        }
        .project-card:hover { transform: translateY(-2px); border-color: var(--accent); box-shadow: 0 10px 25px rgba(0,0,0,0.02); }
        .project-card.selected-active { border-color: var(--primary); background-color: #fffcfd; }

        .card-meta { display: flex; justify-content: space-between; align-items: center; }
        .badge { font-size: 0.6rem; padding: 3px 8px; border-radius: 6px; color: white; font-weight: 700; text-transform: uppercase; }
        .badge.novel { background-color: #ff8fab; }
        .badge.manga { background-color: #4cc9f0; }
        
        .card-title { font-size: 1.05rem; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 80%; }
        
        .del-icon {
            background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.9rem; padding: 4px; border-radius: 6px;
            transition: color 0.2s; margin-left: auto;
        }
        .del-icon:hover { color: #ff477e; background-color: #fff0f2; }

        /* Section 2: Immersive Creative Canvas Editor */
        .editor-canvas {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.02);
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .editor-config-row {
            display: flex;
            gap: 14px;
            align-items: center;
            border-bottom: 1px dashed var(--border);
            padding-bottom: 20px;
        }
        .clean-select {
            padding: 8px 14px;
            border: 1px solid var(--border);
            background-color: #faf7f8;
            border-radius: 10px;
            font-size: 0.85rem;
            color: var(--text);
            outline: none;
            cursor: pointer;
        }
        .color-picker-wrapper { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; color: var(--muted); margin-left: auto; }

        .main-title-field {
            font-family: 'Fredoka', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--text);
            border: none;
            outline: none;
            width: 100%;
        }
        .main-title-field::placeholder { color: #ebdcd5; }

        /* Dynamic Workspaces */
        .workspace-panel { display: none; flex-direction: column; }
        .workspace-panel.active { display: flex; }

        .novel-textarea {
            width: 100%;
            min-height: 300px;
            border: none;
            resize: vertical;
            outline: none;
            font-size: 1.1rem;
            line-height: 1.7;
            color: var(--text);
            background: transparent;
        }
        .novel-textarea::placeholder { color: #ebdcd5; font-style: italic; }

        /* Manga Dex Layout Blocks */
        .manga-dex-block { display: flex; flex-direction: column; gap: 16px; }
        .dex-upload-dropzone {
            border: 2px dashed var(--accent);
            background: #fffafb;
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            position: relative;
            cursor: pointer;
            transition: background 0.2s;
        }
        .dex-upload-dropzone:hover { background: #fff0f3; }
        .dex-upload-dropzone input[type="file"] { position: absolute; top:0; left:0; width:100%; height:100%; opacity:0; cursor:pointer; }
        
        .dex-desc-field {
            width: 100%;
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: 14px;
            outline: none;
            font-size: 1rem;
            background: #faf7f8;
            resize: vertical;
            min-height: 100px;
        }

        /* Footer Sync Control */
        .canvas-footer { display: flex; justify-content: flex-end; padding-top: 10px; }
        .sync-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px 36px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(255, 117, 143, 0.2);
            transition: all 0.2s var(--timing);
        }
        .sync-btn:hover { background-color: #ff5c7c; transform: translateY(-1px); box-shadow: 0 8px 25px rgba(255, 117, 143, 0.3); }
    </style>
</head>
<body>

    <div class="workspace-container">
        <!-- Minimal Header -->
        <header class="header-section">
            <div class="brand-title">Studio Room</div>
            <div id="greeting" class="greeting-bubble">Hi there! ✨</div>
        </header>

        <!-- Top Section: Library Shelf Dashboard -->
        <section class="dashboard-shelf">
            <div class="shelf-header">
                <h2>Your Work Shelf</h2>
                <button class="new-btn" onclick="clearFormToNewDraft()">+ Add New Manuscript</button>
            </div>
            <div id="storyList" class="grid-shelf"></div>
        </section>

        <!-- Bottom Section: The Clean Core Document Canvas -->
        <main class="editor-canvas">
            <input type="hidden" id="storyId">
            
            <div class="editor-config-row">
                <select id="storyType" class="clean-select" onchange="switchLayoutMode(this.value)">
                    <option value="novel">📖 Novel Manuscript</option>
                    <option value="manga">🎨 Manga Dex Format</option>
                </select>
                
                <div class="color-picker-wrapper">
                    <span>Text Style Accent:</span>
                    <input type="color" id="storyColor" value="#2b2224" onchange="applyLiveColorChange(this.value)" style="border:none; cursor:pointer; background:none; width:26px; height:26px;">
                </div>
            </div>

            <!-- Global Title Input -->
            <input type="text" id="storyTitle" placeholder="Untitled Document" class="main-title-field">

            <!-- Dynamic Workspace Panels -->
            <div id="novelWorkspace" class="workspace-panel active">
                <textarea id="storySynopsis" placeholder="Start typing your story script or description content natively right here..." class="novel-textarea"></textarea>
            </div>

            <div id="mangaWorkspace" class="workspace-panel">
                <div class="manga-dex-block">
                    <div class="dex-upload-dropzone">
                        <span id="fileLabel">📎 Drag or tap to drop chapter manuscript file / art pages (.pdf, .png)</span>
                        <input type="file" id="mangaFileLoader" accept="image/*, application/pdf">
                    </div>
                    <textarea id="panelDescription" placeholder="MangaDex Panel Description (e.g., Act 1: Scene breakdown, user guidelines...)" class="dex-desc-field"></textarea>
                </div>
            </div>
            
            <!-- Sync Action Dock -->
            <div class="canvas-footer">
                <button id="saveBtn" class="sync-btn">Save Changes</button>
            </div>
        </main>
    </div>

    <script>
        // --- 1. CLOCK LOGIC FOR TIMEZONES ---
        try {
            const norwayTimeStr = new Date().toLocaleString("en-US", {timeZone: "Europe/Oslo"});
            const norwayHour = new Date(norwayTimeStr).getHours();
            const greetingEl = document.getElementById('greeting');
            if (norwayHour >= 5 && norwayHour < 12) greetingEl.innerText = "Good morning, cutie! 🌸";
            else if (norwayHour >= 12 && norwayHour < 17) greetingEl.innerText = "Good afternoon, sweetie! ☀️";
            else if (norwayHour >= 17 && norwayHour < 22) greetingEl.innerText = "Good evening, darling! 🌟";
            else greetingEl.innerText = "Up late, little star? 🌙";
        } catch(e) {
            document.getElementById('greeting').innerText = "Welcome back! ✨";
        }

        // --- 2. CONFIG SUPABASE INITIALIZATION ---
        const SUPABASE_URL = "https://vmdpxqgemkwcojgjziuh.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZtZHB4cWdlbWt3Y29qZ2p6aXVoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyMzg2NTgsImV4cCI6MjA5ODgxNDY1OH0.sAlGQJzAy8JLUvfBuyfNo23v3A5IStwYhNbMMbDVtFQ";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- 3. DYNAMIC INTERFACE FUNCTIONS ---
        function switchLayoutMode(mode) {
            document.getElementById('novelWorkspace').classList.remove('active');
            document.getElementById('mangaWorkspace').classList.remove('active');
            
            if (mode === 'novel') {
                document.getElementById('novelWorkspace').classList.add('active');
            } else {
                document.getElementById('mangaWorkspace').classList.add('active');
            }
        }

        function applyLiveColorChange(colorHex) {
            document.getElementById('storyTitle').style.color = colorHex;
            document.getElementById('storySynopsis').style.color = colorHex;
        }

        document.getElementById('mangaFileLoader').addEventListener('change', function(e) {
            if(e.target.files[0]) {
                document.getElementById('fileLabel').innerText = `✅ Attachment: ${e.target.files[0].name}`;
            }
        });

        // --- 4. ENGINE CONTROLLER ACTIONS ---
        async function fetchStories() {
            const { data: stories, error } = await supabase.from('stories').select('*').order('created_at', { ascending: false });
            if (error) return;
            
            const listEl = document.getElementById('storyList');
            const currentEditingId = document.getElementById('storyId').value;
            listEl.innerHTML = '';
            
            stories.forEach(story => {
                const isActive = currentEditingId === story.id;
                const card = document.createElement('div');
                card.className = `project-card ${isActive ? 'selected-active' : ''}`;
                card.setAttribute('onclick', `selectProject('${story.id}', '${escape(story.title)}', '${story.type}', '${escape(story.synopsis || '')}', '${story.text_color || ''}')`);
                
                card.innerHTML = `
                    <div class="card-meta">
                        <span class="badge ${story.type}">${story.type}</span>
                        <button class="del-icon" onclick="event.stopPropagation(); deleteStory('${story.id}')">🗑️</button>
                    </div>
                    <div class="card-title" style="color: ${story.text_color || 'inherit'};">${story.title || 'Untitled'}</div>
                `;
                listEl.appendChild(card);
            });
        }

        function selectProject(id, title, type, content, color) {
            document.getElementById('storyId').value = id;
            document.getElementById('storyTitle').value = unescape(title);
            document.getElementById('storyType').value = type;
            switchLayoutMode(type);

            if (type === 'novel') {
                document.getElementById('storySynopsis').value = unescape(content);
                document.getElementById('panelDescription').value = '';
            } else {
                document.getElementById('panelDescription').value = unescape(content);
                document.getElementById('storySynopsis').value = '';
            }
            
            if(color) {
                document.getElementById('storyColor').value = color;
                applyLiveColorChange(color);
            }
            fetchStories();
        }

        document.getElementById('saveBtn').addEventListener('click', async () => {
            const id = document.getElementById('storyId').value;
            const title = document.getElementById('storyTitle').value || 'Untitled';
            const type = document.getElementById('storyType').value;
            const text_color = document.getElementById('storyColor').value;
            
            const contentData = (type === 'novel') ? document.getElementById('storySynopsis').value : document.getElementById('panelDescription').value;

            const payload = { title, type, synopsis: contentData, text_color };

            if (id) {
                await supabase.from('stories').update(payload).eq('id', id);
            } else {
                const { data } = await supabase.from('stories').insert([payload]).select();
                if(data && data[0]) document.getElementById('storyId').value = data[0].id;
            }
            
            fetchStories();
            alert("Changes perfectly saved!");
        });

        async function deleteStory(id) {
            if (confirm("Are you sure you want to completely erase this card data?")) {
                await supabase.from('stories').delete().eq('id', id);
                if(document.getElementById('storyId').value === id) clearFormToNewDraft();
                else fetchStories();
            }
        }

        function clearFormToNewDraft() {
            document.getElementById('storyId').value = '';
            document.getElementById('storyTitle').value = '';
            document.getElementById('storySynopsis').value = '';
            document.getElementById('panelDescription').value = '';
            document.getElementById('fileLabel').innerText = "📎 Drag or tap to drop chapter manuscript file / art pages (.pdf, .png)";
            document.getElementById('mangaFileLoader').value = '';
            applyLiveColorChange("#2b2224");
            fetchStories();
        }

        fetchStories();
    </script>
</body>
</html>
